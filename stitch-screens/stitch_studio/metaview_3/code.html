<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f7f9fb;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-surface bg-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/70 backdrop-blur-xl shadow-sm shadow-emerald-900/5">
<div class="flex justify-between items-center px-6 py-4 max-w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-emerald-700 text-xl" data-icon="biotech">biotech</span>
<h1 class="text-xl font-bold tracking-tighter text-slate-900 font-headline">MetaView</h1>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="minimalist user avatar placeholder with soft grey background and clean aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9odcy0DykRZ4DKCu_seQhgcbG33lN6dpeylKVKCzhpeW3VVduszXb8Wma_6Hm3Pc4EPTmiyxAecsZk3bH0a0bWOXj8FtnuLe1oFzHsvt7J441J1qfnaDThf6SlDnEjG0eabtuQggwsiaAOX2OZjkXggG5XBwiJIQcWvo-SJjAbyRzJCfWJ14IKeGvCLX5PMR5cPpXuE2p1fFsp9cXmh9VSBRNVi_XQdEv3pghtOzT2qCwbN-MWD7LtTzuUu6nF6NoOP1Vh7_FvlY"/>
</div>
</div>
<div class="bg-slate-200/20 h-[1px] w-full absolute bottom-0"></div>
</header>
<main class="pt-20 px-4 space-y-8">
<!-- Hero Section: Ask Anything -->
<section class="mt-6 space-y-2">
<p class="text-[10px] tracking-[0.1em] text-on-surface-variant font-medium uppercase opacity-60">Workbench v2.0</p>
<h2 class="text-3xl font-bold tracking-tight text-on-surface leading-tight">想问什么直接问</h2>
<p class="text-on-surface-variant text-sm max-w-[80%]">通过先进的临床级 AI 生成精确的生物医学可视化内容。</p>
</section>
<!-- Workbench Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_-4px_rgba(25,28,30,0.06)] p-5 border border-outline-variant/10 space-y-6">
<!-- Mode Toggle -->
<div class="flex p-1 bg-surface-container-low rounded-lg gap-1">
<button class="flex-1 py-2 text-sm font-semibold rounded-md bg-white text-primary shadow-sm transition-all">
                    智能模式
                </button>
<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-all">
                    专家模式
                </button>
</div>
<!-- Input Area -->
<div class="space-y-3">
<div class="relative">
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary/20 min-h-[140px] resize-none text-on-surface placeholder:text-on-surface-variant/40" placeholder="描述您想生成的医学过程，例如：'冠状动脉支架植入过程的微观视图'..."></textarea>
<div class="absolute bottom-3 right-3 flex gap-2">
<button class="p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mic">mic</span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="attachment">attachment</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white py-4 rounded-xl font-bold text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-all shadow-lg shadow-primary/10">
<span class="material-symbols-outlined" data-icon="movie_filter" style="font-variation-settings: 'FILL' 1;">movie_filter</span>
                    生成视频
                </button>
</div>
<!-- Accuracy Badge -->
<div class="flex items-center gap-3 py-3 px-4 bg-emerald-50/50 rounded-lg border border-emerald-100/50">
<span class="material-symbols-outlined text-primary text-sm" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
<p class="text-[11px] font-medium text-emerald-800 tracking-wide">临床与生物学精确性：由 MetaView-IV 模型驱动</p>
</div>
</div>
<!-- Recent Generations -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<h3 class="text-lg font-bold tracking-tight text-on-surface">最近生成</h3>
<button class="text-xs font-semibold text-primary uppercase tracking-wider">查看全部</button>
</div>
<!-- Bento-style Grid for Mobile -->
<div class="grid grid-cols-2 gap-3">
<div class="col-span-2 relative group rounded-xl overflow-hidden aspect-[16/9] shadow-md">
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="high-tech 3d render of human DNA helix with glowing emerald light particles in a clean clinical environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzk5JrgTMmquK2Xs2LTie5UANauDMJwFXiHdoChdS6n3ujTUWaccGuQX8maH3wZ9SdgK1LxBP_qRMQFQG-FeIMxL4G0YYsd035TOp7TZLwlxu4sApvG25cH3EVfxCk97x8IlKvjrNGoa7iD6zx1vpwiJu7YCHSxU5bvic5BFhGlXKLEsqoCW6VeMioCor4-mhmtB2qrZZNMxsXUWdNUb0cb_yRiL0xwxQbCo3wixoIl7JK8Fyu3WwVqYnY26oRy9-EH4jfdx-_sWI"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-4">
<span class="text-[10px] text-emerald-300 font-bold uppercase tracking-widest mb-1">已完成</span>
<p class="text-white text-sm font-medium">细胞端粒修复过程</p>
</div>
</div>
<div class="relative group rounded-xl overflow-hidden aspect-square shadow-sm">
<img class="w-full h-full object-cover" data-alt="microscopic view of vibrant teal and green cells under high-resolution laboratory imaging with soft bokeh" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCO77kw60Fo6kfhfla_PjQGyXpaC6KNtZmz4WerUL-bLguwDfs7SffNchdLaXHbwbC2tnhPLEdU3FiacOTxRoTh1QCetFgIuJnefr28MdmHa8mJPV02tAtFI4dMvyOaAYJgFocn-uxfk6Uai50KQHQZQgzYlaKlac2cclCzT5W0yrvgN8MmrAhVzYUgA0vn8vXfn5eJbN5MPkKf_BL61EkbuBiArDmgdB3uKeqQJ4V9_E2NUINb1Uh6e2e0TofuLIpv6ktz3v0ST7U"/>
<div class="absolute inset-0 bg-black/20 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-3xl opacity-80" data-icon="play_circle" style="font-variation-settings: 'FILL' 1;">play_circle</span>
</div>
</div>
<div class="relative group rounded-xl overflow-hidden aspect-square shadow-sm bg-surface-container-low flex flex-col items-center justify-center border border-dashed border-outline-variant/50">
<span class="material-symbols-outlined text-primary/40 text-4xl mb-2" data-icon="add_task">add_task</span>
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter">新建项目</p>
</div>
</div>
</section>
<!-- Info/Status Footer -->
<section class="py-6 border-t border-outline-variant/10">
<div class="flex gap-4 items-start opacity-70">
<div class="p-2 bg-surface-container-high rounded-lg">
<span class="material-symbols-outlined text-primary text-xl" data-icon="cloud_done">cloud_done</span>
</div>
<div>
<h4 class="text-xs font-bold text-on-surface uppercase tracking-wider">服务器状态</h4>
<p class="text-[10px] text-on-surface-variant mt-1">亚太地区节点正常运行。当前平均生成时长：145秒。</p>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-white/80 backdrop-blur-2xl border-t border-slate-100 shadow-[0px_-4px_20px_rgba(0,0,0,0.03)]">
<div class="flex justify-around items-center px-4 pb-6 pt-3">
<a class="flex flex-col items-center justify-center text-emerald-700 bg-emerald-50/50 rounded-xl px-4 py-1.5 active:scale-90 duration-200 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="science" style="font-variation-settings: 'FILL' 1;">science</span>
<span class="font-['Space_Grotesk'] text-[11px] uppercase tracking-[0.05em] font-medium mt-1">Studio</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-1.5 hover:text-emerald-600 active:scale-90 duration-200 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Space_Grotesk'] text-[11px] uppercase tracking-[0.05em] font-medium mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-1.5 hover:text-emerald-600 active:scale-90 duration-200 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="architecture">architecture</span>
<span class="font-['Space_Grotesk'] text-[11px] uppercase tracking-[0.05em] font-medium mt-1">Tools</span>
</a>
</div>
</nav>
</body></html>
