services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian-security}
        APT_PIPELINE_DEPTH: ${APT_PIPELINE_DEPTH:-0}
    environment:
      METAVIEW_DEFAULT_PROVIDER: ${METAVIEW_DEFAULT_PROVIDER:-mock}
      METAVIEW_DEFAULT_ROUTER_PROVIDER: ${METAVIEW_DEFAULT_ROUTER_PROVIDER:-mock}
      METAVIEW_DEFAULT_GENERATION_PROVIDER: ${METAVIEW_DEFAULT_GENERATION_PROVIDER:-mock}
      METAVIEW_MOCK_PROVIDER_ENABLED: ${METAVIEW_MOCK_PROVIDER_ENABLED:-true}
      METAVIEW_ENABLED_DOMAINS: ${METAVIEW_ENABLED_DOMAINS:-algorithm,math,code,physics,chemistry,biology,geography}
      METAVIEW_MAX_REPAIR_ATTEMPTS: ${METAVIEW_MAX_REPAIR_ATTEMPTS:-2}
      METAVIEW_HISTORY_DB_PATH: ${METAVIEW_HISTORY_DB_PATH:-data/pipeline_runs.db}
      METAVIEW_CORS_ORIGIN_REGEX: ${METAVIEW_CORS_ORIGIN_REGEX:-^https?://(localhost|127\.0\.0\.1)(:\d+)?$$}
      METAVIEW_PLAYBOOK_DEFAULT_FPS: ${METAVIEW_PLAYBOOK_DEFAULT_FPS:-30}
      METAVIEW_PLAYBOOK_DEFAULT_STEP_FRAMES: ${METAVIEW_PLAYBOOK_DEFAULT_STEP_FRAMES:-60}
      METAVIEW_PLAYBOOK_COMPOSITION_WIDTH: ${METAVIEW_PLAYBOOK_COMPOSITION_WIDTH:-960}
      METAVIEW_PLAYBOOK_COMPOSITION_HEIGHT: ${METAVIEW_PLAYBOOK_COMPOSITION_HEIGHT:-540}
      METAVIEW_OPENAI_API_KEY: ${METAVIEW_OPENAI_API_KEY:-}
      METAVIEW_OPENAI_BASE_URL: ${METAVIEW_OPENAI_BASE_URL:-https://api.openai.com/v1}
      METAVIEW_OPENAI_MODEL: ${METAVIEW_OPENAI_MODEL:-}
      METAVIEW_OPENAI_SUPPORTS_VISION: ${METAVIEW_OPENAI_SUPPORTS_VISION:-false}
      METAVIEW_OPENAI_TIMEOUT_S: ${METAVIEW_OPENAI_TIMEOUT_S:-300}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      - api
    ports:
      - "5173:80"
