services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ALGO_VIS_DEFAULT_PROVIDER: ${ALGO_VIS_DEFAULT_PROVIDER:-mock}
      ALGO_VIS_DEFAULT_ROUTER_PROVIDER: ${ALGO_VIS_DEFAULT_ROUTER_PROVIDER:-mock}
      ALGO_VIS_DEFAULT_GENERATION_PROVIDER: ${ALGO_VIS_DEFAULT_GENERATION_PROVIDER:-mock}
      ALGO_VIS_MOCK_PROVIDER_ENABLED: ${ALGO_VIS_MOCK_PROVIDER_ENABLED:-true}
      ALGO_VIS_ENABLED_DOMAINS: ${ALGO_VIS_ENABLED_DOMAINS:-algorithm,math,code,physics,chemistry,biology,geography}
      ALGO_VIS_SANDBOX_TIMEOUT_MS: ${ALGO_VIS_SANDBOX_TIMEOUT_MS:-1500}
      ALGO_VIS_MAX_REPAIR_ATTEMPTS: ${ALGO_VIS_MAX_REPAIR_ATTEMPTS:-2}
      ALGO_VIS_HISTORY_DB_PATH: ${ALGO_VIS_HISTORY_DB_PATH:-data/pipeline_runs.db}
      ALGO_VIS_PREVIEW_RENDER_BACKEND: ${ALGO_VIS_PREVIEW_RENDER_BACKEND:-fallback}
      ALGO_VIS_PREVIEW_TTS_ENABLED: ${ALGO_VIS_PREVIEW_TTS_ENABLED:-true}
      ALGO_VIS_PREVIEW_TTS_BACKEND: ${ALGO_VIS_PREVIEW_TTS_BACKEND:-openai_compatible}
      ALGO_VIS_PREVIEW_TTS_MODEL: ${ALGO_VIS_PREVIEW_TTS_MODEL:-mimotts-v2}
      ALGO_VIS_PREVIEW_TTS_BASE_URL: ${ALGO_VIS_PREVIEW_TTS_BASE_URL:-}
      ALGO_VIS_PREVIEW_TTS_API_KEY: ${ALGO_VIS_PREVIEW_TTS_API_KEY:-}
      ALGO_VIS_PREVIEW_TTS_VOICE: ${ALGO_VIS_PREVIEW_TTS_VOICE:-default}
      ALGO_VIS_PREVIEW_TTS_RATE_WPM: ${ALGO_VIS_PREVIEW_TTS_RATE_WPM:-150}
      ALGO_VIS_PREVIEW_TTS_SPEED: ${ALGO_VIS_PREVIEW_TTS_SPEED:-0.88}
      ALGO_VIS_PREVIEW_TTS_MAX_CHARS: ${ALGO_VIS_PREVIEW_TTS_MAX_CHARS:-1500}
      ALGO_VIS_PREVIEW_TTS_TIMEOUT_S: ${ALGO_VIS_PREVIEW_TTS_TIMEOUT_S:-120}
      ALGO_VIS_OPENAI_API_KEY: ${ALGO_VIS_OPENAI_API_KEY:-}
      ALGO_VIS_OPENAI_BASE_URL: ${ALGO_VIS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      ALGO_VIS_OPENAI_MODEL: ${ALGO_VIS_OPENAI_MODEL:-}
      ALGO_VIS_OPENAI_SUPPORTS_VISION: ${ALGO_VIS_OPENAI_SUPPORTS_VISION:-false}
      ALGO_VIS_OPENAI_TIMEOUT_S: ${ALGO_VIS_OPENAI_TIMEOUT_S:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      - api
    ports:
      - "5173:80"
