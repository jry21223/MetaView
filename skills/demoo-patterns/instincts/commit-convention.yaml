# Use Conventional Commits

## Action
Prefix commits with: `feat:`, `fix:`, `perf:`, `chore:`, `docs:`, `build:`

Optional scopes: `feat(ui):`, `feat(api):`, `fix(web):`, `chore(deploy):`

## Evidence
- Analyzed 34 commits
- 97% follow conventional commit format
- Scoped variants used for frontend/backend separation

## Examples
```
feat: add dual-provider orchestration
feat(api): enable real Manim rendering in Docker
fix(web): proxy preview media through nginx
perf: reduce mobile lag by throttling updates
chore(deploy): switch Docker apt mirror for CN builds
```