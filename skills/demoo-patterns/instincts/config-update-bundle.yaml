# Bundle Config Changes with Documentation

## Action
When modifying `config.py`:
1. Update `.env.example` with new variable
2. Document in `README.md`
3. Add test in `tests/test_config.py` if complex

## Evidence
- 10 commits changed `.env.example`
- 15 commits changed `README.md`
- Config changes almost always bundled with both files

## Examples
From commit `feat(api): enable real Manim rendering in Docker`:
- Modified: `config.py` (new manim settings)
- Modified: `.env.example` (ALGO_VIS_MANIM_* vars)
- Modified: `README.md` (documentation)
- Modified: `docker-compose.yml` (deployment)

## Why
- Users need example env vars to configure
- README serves as quick reference
- Prevents config drift