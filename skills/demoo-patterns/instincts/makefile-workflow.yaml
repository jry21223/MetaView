# Use Makefile Commands

## Action
Use Makefile targets instead of direct commands for consistency.

## Evidence
- 18 Makefile targets defined
- Pattern: `make bootstrap`, `make dev`, `make test`, `make check`

## Common Commands
```bash
make bootstrap          # Setup: npm install + .venv + pip install
make dev                # Run both API and web
make dev-api            # Just backend (uvicorn --reload)
make dev-web            # Just frontend (vite)
make lint               # ruff + eslint
make test               # pytest apps/api/tests -q
make check              # lint + test + build (pre-commit)
make start              # docker compose up
make stop               # docker compose down
```

## Why
- Ensures consistent dev environment
- Handles docker-compose fallback detection
- Pre-commit hook uses `make check`