# Implement ModelProvider Protocol

## Action
All model providers must implement the `ModelProvider` protocol from `providers/base.py`.

Required methods:
- `route()` - Domain classification
- `plan()` - CIR generation
- `code()` - Script generation
- `critique()` - Quality check
- `repair_code()` - Fix issues

## Evidence
- Protocol defined in `apps/api/app/services/providers/base.py`
- Existing implementations: `MockModelProvider`, `OpenAICompatibleProvider`
- Protocol uses frozen dataclasses for hints: `PlanningHints`, `CodingHints`, `CritiqueHints`

## Examples
```python
# providers/base.py
class ModelProvider(Protocol):
    descriptor: ProviderDescriptor

    def route(self, prompt: str, ...) -> tuple[TopicDomain, AgentTrace]: ...
    def plan(self, prompt: str, ...) -> tuple[PlanningHints, AgentTrace]: ...
    def code(self, cir: CirDocument, ...) -> tuple[CodingHints, AgentTrace]: ...
    def critique(self, ...) -> tuple[CritiqueHints, AgentTrace]: ...
    def repair_code(self, ...) -> tuple[CodingHints, AgentTrace]: ...
```

## Workflow
1. Create provider in `providers/new_provider.py`
2. Implement all protocol methods
3. Register in `providers/registry.py`
4. Add test file `tests/test_provider_new.py`