# Use ALGO_VIS_ Env Prefix

## Action
All environment variables for backend config must use `ALGO_VIS_` prefix.

Add new config to `apps/api/app/config.py` using Pydantic Settings.

## Evidence
- Analyzed `config.py` - all settings use `ALGO_VIS_` prefix
- Pattern: `env_prefix="ALGO_VIS_"` in `model_config`

## Examples
```python
# config.py
class Settings(BaseSettings):
    model_config = SettingsConfigDict(
        env_prefix="ALGO_VIS_",  # All env vars use this prefix
        ...
    )

    # These become ALGO_VIS_OPENAI_API_KEY, ALGO_VIS_HISTORY_DB_PATH
    openai_api_key: str | None = None
    history_db_path: str = "data/pipeline_runs.db"
```

## Workflow
When adding config:
1. Add setting to `config.py`
2. Add to `.env.example` with `ALGO_VIS_` prefix
3. Document in `README.md`